<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARBIG量化交易系统 - 总控台</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-content">
            <a href="/" class="navbar-brand">📊 ARBIG量化交易系统</a>
            <div class="navbar-center">
                <ul class="navbar-nav">
                    <li><a href="/" class="active">总控台</a></li>
                    <li><a href="/strategy">策略中心</a></li>
                    <li><a href="/trading_logs">交易日志</a></li>
                    <li><a href="/api/docs" target="_blank">API文档</a></li>
                </ul>
            </div>
            <div class="navbar-user">
                <div class="user-info">
                    <div class="user-avatar">👤</div>
                    <div class="user-details">
                        <div class="user-name">交易员</div>
                        <div class="user-status">在线</div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- 系统状态 + 账户信息 -->
        <div class="grid grid-2" style="margin-top: 24px;">
            <!-- 系统状态 -->
            <div class="card">
                <div class="card-header">🔧 系统状态</div>
                <div class="card-body">
                    <div class="status-grid">
                        <div class="status-item">
                            <span class="status-label">CTP连接:</span>
                            <span class="status-value online" id="ctp-connection-status">检测中...</span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">交易服务:</span>
                            <span class="status-value online" id="trading-service-status">检测中...</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 账户信息 -->
            <div class="card">
                <div class="card-header">💰 账户信息</div>
                <div class="card-body">
                    <div class="grid grid-4" style="gap: 16px;">
                        <div style="text-align: center;">
                            <div style="font-size: 18px; font-weight: 700; color: var(--primary-color);" id="account-balance">--</div>
                            <div style="color: var(--text-secondary); font-size: 12px; margin-top: 4px;">账户余额</div>
                        </div>
                        <div style="text-align: center;">
                            <div style="font-size: 18px; font-weight: 700;" id="available-funds">--</div>
                            <div style="color: var(--text-secondary); font-size: 12px; margin-top: 4px;">可用资金</div>
                        </div>
                        <div style="text-align: center;">
                            <div style="font-size: 18px; font-weight: 700; color: var(--warning-color);" id="margin-used">--</div>
                            <div style="color: var(--text-secondary); font-size: 12px; margin-top: 4px;">占用保证金</div>
                        </div>
                        <div style="text-align: center;">
                            <div style="font-size: 18px; font-weight: 700;" id="total-pnl-display">--</div>
                            <div style="color: var(--text-secondary); font-size: 12px; margin-top: 4px;">总盈亏</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 实时行情卡片 -->
        <div class="card" style="margin-top: 24px;">
            <div class="card-header">
                <span>📈 实时行情 - <span id="main-contract-symbol">加载中...</span></span>
                <span class="status-indicator online" id="market-status" style="float: right;">
                    <span class="status-dot"></span>
                    已连接
                </span>
            </div>
            <div class="card-body" style="padding: 0;">
                <div class="orderbook">
                    <div class="orderbook-row sell">
                        <div class="price-label">ASK</div>
                        <div class="price-value" id="ask-price">--</div>
                        <div class="volume-value" id="ask-volume">--</div>
                    </div>
                    <div class="orderbook-center">
                        <div>
                            <div class="last-price" id="last-price">--</div>
                            <div style="font-size: 12px; color: var(--text-secondary); margin-top: 2px;">最新价</div>
                        </div>
                        <div class="price-change" id="price-change">--</div>
                    </div>
                    <div class="orderbook-row buy">
                        <div class="price-label">BID</div>
                        <div class="price-value" id="bid-price">--</div>
                        <div class="volume-value" id="bid-volume">--</div>
                    </div>
                </div>
                <div style="padding: 12px 20px; text-align: center; background: var(--bg-secondary);">
                    <div style="font-size: 16px; font-weight: 600;" id="volume">--</div>
                    <div style="color: var(--text-secondary); font-size: 11px; margin-top: 2px;">总成交量</div>
                </div>
            </div>
        </div>

        <!-- 持仓管理 -->
        <div class="card" style="margin-top: 24px;">
            <div class="card-header">
                <span>💼 持仓管理</span>
                <button class="btn btn-outline" onclick="refreshPositions()" style="float: right; font-size: 12px; padding: 4px 12px;">🔄 刷新</button>
            </div>
            <div class="card-body">
                <div id="positions-loading" class="loading">
                    <div class="spinner"></div>
                    加载中...
                </div>
                <div id="positions-content" style="display: none;">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>合约</th>
                                <th>方向</th>
                                <th>数量</th>
                                <th>开仓价</th>
                                <th>当前价</th>
                                <th>浮动盈亏</th>
                            </tr>
                        </thead>
                        <tbody id="positions-table"></tbody>
                    </table>
                </div>
                <div id="no-positions" style="display: none; text-align: center; padding: 30px; color: var(--text-secondary);">
                    暂无持仓
                </div>
            </div>
        </div>

        <!-- 策略触发记录 -->
        <div style="margin-top: 24px;">
            <div class="card">
                <div class="card-header">📋 策略触发记录</div>
                <div class="card-body">
                    <div id="triggers-loading" class="loading">
                        <div class="spinner"></div>
                        加载中...
                    </div>
                    <div id="triggers-content" style="display: none;">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>时间</th>
                                    <th>策略</th>
                                    <th>信号</th>
                                    <th>方向</th>
                                    <th>数量</th>
                                </tr>
                            </thead>
                            <tbody id="triggers-table"></tbody>
                        </table>
                    </div>
                    <div id="no-triggers" style="display: none; text-align: center; padding: 30px; color: var(--text-secondary);">
                        暂无触发记录
                    </div>
                </div>
            </div>
        </div>

        <!-- 紧急停止 -->
        <div class="card" style="margin-top: 24px; border: 2px solid var(--error-color);">
            <div class="card-body" style="text-align: center; padding: 16px;">
                <button class="btn btn-danger" onclick="emergencyStop()" style="font-size: 16px; padding: 10px 40px;">
                    🛑 紧急停止（停止所有策略和交易）
                </button>
            </div>
        </div>
    </div>

    <script src="/static/js/dashboard.js?v=3.0"></script>
</body>
</html>
