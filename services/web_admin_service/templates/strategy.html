<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>策略中心 - ARBIG量化交易系统</title>
    <link rel="stylesheet" href="/static/css/dashboard.css?v=3.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
    <style>
        .strategy-card { background: white; border: 1px solid #e1e5e9; border-radius: 8px; padding: 20px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s; }
        .strategy-card:hover { border-color: #007bff; box-shadow: 0 2px 8px rgba(0,123,255,0.15); }
        .strategy-card.selected { border-color: #007bff; background: #f8f9ff; }
        .strategy-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .strategy-info h4 { margin: 0; font-size: 15px; }
        .strategy-type { color: #6c757d; font-size: 11px; background: #f8f9fa; padding: 2px 8px; border-radius: 12px; }
        .status-badge { padding: 4px 12px; border-radius: 16px; font-size: 12px; font-weight: 500; }
        .status-badge.stopped { background: #f8d7da; color: #721c24; }
        .status-badge.running { background: #d4edda; color: #155724; }
        .strategy-actions { display: flex; gap: 8px; margin-top: 12px; }
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .tab-bar { display: flex; border-bottom: 2px solid #e1e5e9; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; border: none; background: none; cursor: pointer; font-weight: 500; color: #6c757d; border-bottom: 2px solid transparent; margin-bottom: -2px; }
        .tab-btn.active { color: #007bff; border-bottom-color: #007bff; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .backtest-form { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 12px; align-items: end; }
        .backtest-form .form-group { display: flex; flex-direction: column; }
        .backtest-form .form-group label { font-weight: 500; margin-bottom: 4px; font-size: 13px; }
        .backtest-form .form-group select, .backtest-form .form-group input { padding: 8px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .result-card { background: #f8f9fa; border: 1px solid #e1e5e9; border-radius: 6px; padding: 16px; margin-bottom: 12px; }
        .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .metrics-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .metric-box { text-align: center; padding: 8px; background: white; border-radius: 4px; }
        .metric-box .val { font-size: 18px; font-weight: 600; margin-bottom: 2px; }
        .metric-box .val.pos { color: #28a745; }
        .metric-box .val.neg { color: #dc3545; }
        .metric-box .lbl { font-size: 11px; color: #6c757d; text-transform: uppercase; }
        .empty-state { text-align: center; color: #6c757d; padding: 40px; }
        .notification { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 4px; color: white; font-weight: 500; z-index: 1000; animation: slideIn 0.3s ease; }
        .notification-success { background: #28a745; }
        .notification-error { background: #dc3545; }
        .notification-info { background: #17a2b8; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } .backtest-form { grid-template-columns: 1fr; } .metrics-row { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-content">
            <a href="/" class="navbar-brand">📊 ARBIG量化交易系统</a>
            <div class="navbar-center">
                <ul class="navbar-nav">
                    <li><a href="/">总控台</a></li>
                    <li><a href="/strategy" class="active">策略中心</a></li>
                    <li><a href="/trading_logs">交易日志</a></li>
                    <li><a href="/api/docs" target="_blank">API文档</a></li>
                </ul>
            </div>
            <div class="navbar-user">
                <div class="user-info">
                    <div class="user-avatar">👤</div>
                    <div class="user-details">
                        <div class="user-name">交易员</div>
                        <div class="user-status">在线</div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">策略中心</h1>
            <div class="page-subtitle">策略管理、回测分析与性能评估</div>
        </div>

        <!-- 概览统计 -->
        <div class="grid grid-4" style="margin-top: 24px;">
            <div class="card stat-card">
                <div class="stat-value" id="strategy-count">0</div>
                <div class="stat-label">可用策略</div>
            </div>
            <div class="card stat-card">
                <div class="stat-value" id="backtest-service-status">检查中...</div>
                <div class="stat-label">回测服务</div>
            </div>
            <div class="card stat-card">
                <div class="stat-value" id="total-results">0</div>
                <div class="stat-label">历史回测</div>
            </div>
            <div class="card stat-card">
                <div class="stat-value">
                    <button class="btn btn-primary" style="font-size: 13px; padding: 6px 16px;" onclick="refreshAll()">🔄 刷新</button>
                </div>
                <div class="stat-label">操作</div>
            </div>
        </div>

        <!-- 标签页 -->
        <div style="margin-top: 32px;">
            <div class="tab-bar">
                <button class="tab-btn active" onclick="switchTab('strategies', this)">📋 策略列表</button>
                <button class="tab-btn" onclick="switchTab('quick-bt', this)">⚡ 快速回测</button>
                <button class="tab-btn" onclick="switchTab('results', this)">📈 回测结果</button>
            </div>

            <!-- 策略列表 -->
            <div id="tab-strategies" class="tab-panel active">
                <div class="two-col">
                    <div class="card">
                        <div class="card-header">策略列表</div>
                        <div class="card-body">
                            <div id="strategies-list"><div class="empty-state">加载中...</div></div>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-header">策略详情</div>
                        <div class="card-body">
                            <div id="strategy-details"><div class="empty-state">请选择一个策略查看详情</div></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 快速回测 -->
            <div id="tab-quick-bt" class="tab-panel">
                <div class="card">
                    <div class="card-header">⚡ 快速回测</div>
                    <div class="card-body">
                        <div class="backtest-form">
                            <div class="form-group">
                                <label>选择策略</label>
                                <select id="bt-strategy"><option value="">请选择...</option></select>
                            </div>
                            <div class="form-group">
                                <label>回测天数</label>
                                <select id="bt-days">
                                    <option value="3">3天</option>
                                    <option value="7" selected>7天</option>
                                    <option value="15">15天</option>
                                    <option value="30">30天</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>最大持仓</label>
                                <input type="number" id="bt-position" value="5" min="1" max="20">
                            </div>
                            <div class="form-group">
                                <label>&nbsp;</label>
                                <button id="run-bt-btn" class="btn btn-primary" onclick="runQuickBacktest()">🚀 开始回测</button>
                            </div>
                        </div>
                        <div id="bt-result" style="margin-top: 20px;"></div>
                    </div>
                </div>
            </div>

            <!-- 回测结果 -->
            <div id="tab-results" class="tab-panel">
                <div class="card">
                    <div class="card-header">📈 历史回测结果</div>
                    <div class="card-body">
                        <div id="results-list"><div class="empty-state">加载中...</div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let availableStrategies = [];

        // ========== 标签页切换 ==========
        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            btn.classList.add('active');
            if (tabId === 'results') loadBacktestResults();
        }

        // ========== 加载策略列表 ==========
        async function loadStrategyList() {
            const listDiv = document.getElementById('strategies-list');
            try {
                listDiv.innerHTML = '<div class="empty-state">加载中...</div>';
                const resp = await fetch('http://localhost:8002/backtest/strategies');
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const result = await resp.json();

                let strategies = [];
                if (result.success && result.data && result.data.strategies) strategies = result.data.strategies;
                else throw new Error('数据格式错误');

                availableStrategies = strategies;
                document.getElementById('strategy-count').textContent = strategies.length;

                // 填充回测选择框
                const btSelect = document.getElementById('bt-strategy');
                btSelect.innerHTML = '<option value="">请选择...</option>';
                strategies.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; btSelect.appendChild(o); });

                if (strategies.length === 0) { listDiv.innerHTML = '<div class="empty-state">暂无可用策略</div>'; return; }

                listDiv.innerHTML = strategies.map(name => `
                    <div class="strategy-card" onclick="selectStrategy('${name}', this)">
                        <div class="strategy-header">
                            <div class="strategy-info"><h4>${name}</h4><span class="strategy-type">量化策略</span></div>
                            <span class="status-badge stopped">可回测</span>
                        </div>
                        <div class="strategy-actions">
                            <button class="btn btn-primary" style="font-size: 12px; padding: 4px 12px;" onclick="event.stopPropagation(); quickBtFromList('${name}')">快速回测</button>
                            <button class="btn btn-outline" style="font-size: 12px; padding: 4px 12px;" onclick="event.stopPropagation(); window.open('http://localhost:8003/docs','_blank')">API文档</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('加载策略列表失败:', error);
                listDiv.innerHTML = `<div class="empty-state">加载失败: ${error.message}</div>`;
            }
        }

        function selectStrategy(name, el) {
            document.querySelectorAll('.strategy-card').forEach(c => c.classList.remove('selected'));
            if (el) el.classList.add('selected');
            document.getElementById('strategy-details').innerHTML = `
                <h4 style="margin-bottom: 16px;">${name}</h4>
                <div style="background: #f8f9fa; padding: 12px; border-radius: 6px; margin-bottom: 12px;">
                    <div style="display: flex; justify-content: space-between; padding: 4px 0;"><span style="color: #6c757d;">策略名称</span><span>${name}</span></div>
                    <div style="display: flex; justify-content: space-between; padding: 4px 0;"><span style="color: #6c757d;">策略类型</span><span>量化策略</span></div>
                    <div style="display: flex; justify-content: space-between; padding: 4px 0;"><span style="color: #6c757d;">状态</span><span>可用于回测</span></div>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-primary" style="font-size: 13px;" onclick="quickBtFromList('${name}')">快速回测</button>
                    <button class="btn btn-outline" style="font-size: 13px;" onclick="window.open('http://localhost:8003/docs','_blank')">高级回测 (API)</button>
                </div>
            `;
        }

        function quickBtFromList(name) {
            document.getElementById('bt-strategy').value = name;
            switchTab('quick-bt', document.querySelectorAll('.tab-btn')[1]);
        }

        // ========== 回测服务状态 ==========
        async function checkBacktestService() {
            try {
                const resp = await fetch('http://localhost:8003/health');
                const el = document.getElementById('backtest-service-status');
                if (resp.ok) { el.textContent = '正常'; el.style.color = '#28a745'; }
                else { el.textContent = '异常'; el.style.color = '#dc3545'; }
            } catch (e) {
                const el = document.getElementById('backtest-service-status');
                el.textContent = '离线'; el.style.color = '#dc3545';
            }
        }

        // ========== 快速回测 ==========
        async function runQuickBacktest() {
            const strategy = document.getElementById('bt-strategy').value;
            const days = parseInt(document.getElementById('bt-days').value);
            const maxPos = parseInt(document.getElementById('bt-position').value);
            if (!strategy) { alert('请选择策略'); return; }

            const btn = document.getElementById('run-bt-btn');
            const resultDiv = document.getElementById('bt-result');
            btn.textContent = '回测中...'; btn.disabled = true;
            resultDiv.innerHTML = '<div style="text-align:center; color:#007bff; padding:20px;">正在运行回测...</div>';

            try {
                const resp = await fetch('http://localhost:8003/backtest/quick', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ strategy_name: strategy, strategy_setting: { max_position: maxPos }, days: days })
                });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const result = await resp.json();
                if (result.success && result.data) {
                    displayBacktestResult(result.data);
                } else { throw new Error(result.message || '回测失败'); }
            } catch (error) {
                resultDiv.innerHTML = `<div style="text-align:center; color:#dc3545; padding:20px;">回测失败: ${error.message}</div>`;
            } finally {
                btn.textContent = '🚀 开始回测'; btn.disabled = false;
            }
        }

        function displayBacktestResult(data) {
            const m = data.basic_result || data.result || data;
            const ret = (m.total_return || 0) * 100;
            const sharpe = m.sharpe_ratio || 0;
            const dd = (m.max_drawdown || 0) * 100;
            const wr = (m.win_rate || 0) * 100;
            document.getElementById('bt-result').innerHTML = `
                <div style="background: #d4edda; padding: 12px; border-radius: 4px; text-align: center; margin-bottom: 16px; color: #155724;">
                    ✅ 回测完成 — ${data.strategy_name || '策略'} | ${new Date().toLocaleString()}
                </div>
                <div class="metrics-row">
                    <div class="metric-box"><div class="val ${ret >= 0 ? 'pos' : 'neg'}">${ret.toFixed(2)}%</div><div class="lbl">总收益率</div></div>
                    <div class="metric-box"><div class="val">${sharpe.toFixed(2)}</div><div class="lbl">夏普比率</div></div>
                    <div class="metric-box"><div class="val neg">${dd.toFixed(2)}%</div><div class="lbl">最大回撤</div></div>
                    <div class="metric-box"><div class="val">${wr.toFixed(1)}%</div><div class="lbl">胜率</div></div>
                </div>
            `;
        }

        // ========== 回测结果 ==========
        async function loadBacktestResults() {
            const div = document.getElementById('results-list');
            try {
                div.innerHTML = '<div style="text-align:center; color:#007bff; padding:20px;">加载中...</div>';
                const resp = await fetch('http://localhost:8003/backtest/results');
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const result = await resp.json();

                let arr = [];
                if (result.success && result.data) {
                    if (Array.isArray(result.data)) arr = result.data;
                    else if (result.data.results) arr = Object.entries(result.data.results).map(([k, v]) => ({ result_key: k, ...v }));
                }

                document.getElementById('total-results').textContent = arr.length;
                if (arr.length === 0) { div.innerHTML = '<div class="empty-state">暂无回测结果，请先进行回测</div>'; return; }

                div.innerHTML = arr.map(r => {
                    const m = r.basic_result || r.result || r;
                    const ret = (m.total_return || 0) * 100;
                    const name = r.strategy_name || r.result_key?.split('_')[0] || '未知';
                    const time = r.timestamp ? new Date(r.timestamp).toLocaleString() : '--';
                    return `
                        <div class="result-card">
                            <div class="result-header"><strong>${name}</strong><span style="font-size:12px; color:#6c757d;">${time}</span></div>
                            <div class="metrics-row">
                                <div class="metric-box"><div class="val ${ret >= 0 ? 'pos' : 'neg'}">${ret.toFixed(2)}%</div><div class="lbl">收益率</div></div>
                                <div class="metric-box"><div class="val">${(m.sharpe_ratio || 0).toFixed(2)}</div><div class="lbl">夏普比率</div></div>
                                <div class="metric-box"><div class="val">${((m.max_drawdown || 0) * 100).toFixed(2)}%</div><div class="lbl">最大回撤</div></div>
                                <div class="metric-box"><div class="val">${((m.win_rate || 0) * 100).toFixed(1)}%</div><div class="lbl">胜率</div></div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                div.innerHTML = `<div class="empty-state">加载失败: ${error.message}</div>`;
                document.getElementById('total-results').textContent = '0';
            }
        }

        // ========== 刷新 & 初始化 ==========
        function refreshAll() {
            loadStrategyList();
            checkBacktestService();
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadStrategyList();
            checkBacktestService();
        });
    </script>
</body>
</html>
